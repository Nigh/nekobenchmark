name: Build and release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux x64
            os: ubuntu-latest
            asset: nekobenchmark-linux-x64
          - name: Windows x64
            os: windows-latest
            asset: nekobenchmark-windows-x64.exe
          - name: macOS x64
            os: macos-26-intel
            asset: nekobenchmark-macos-x64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - name: Install Linux SDL build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libx11-dev libxext-dev libxrandr-dev libxcursor-dev \
            libxi-dev libxfixes-dev libxss-dev libxtst-dev \
            libwayland-dev libxkbcommon-dev libdecor-0-dev \
            libegl1-mesa-dev libgl1-mesa-dev libgles2-mesa-dev libvulkan-dev
      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release
      - name: Build
        run: cmake --build build --config Release --parallel
      - name: Test
        run: ctest --test-dir build -C Release --output-on-failure
      - name: Prepare Unix binary
        if: runner.os != 'Windows'
        shell: bash
        run: |
          mkdir -p dist
          cp build/nekobenchmark dist/${{ matrix.asset }}
      - name: Prepare Windows binary
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist
          Copy-Item build/Release/nekobenchmark.exe dist/${{ matrix.asset }}
      - uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.asset }}
          path: dist/${{ matrix.asset }}
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          pattern: nekobenchmark-*
          path: release-assets
          merge-multiple: true
      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "build-${GITHUB_RUN_NUMBER}" release-assets/* \
            --target "$GITHUB_SHA" \
            --title "Build ${GITHUB_RUN_NUMBER}" \
            --notes "Automated cross-platform binaries for commit ${GITHUB_SHA}."
