name: Export and release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to create
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux
            os: ubuntu-latest
            asset: nekobenchmark-linux-x64.zip
            preset: Linux
            binary: nekobenchmark.x86_64
          - name: Windows x64
            os: windows-latest
            asset: nekobenchmark-windows-x64.zip
            preset: Windows
            binary: nekobenchmark.exe
          - name: macOS x64
            os: macos-26-intel
            asset: nekobenchmark-macos-x64.zip
            preset: macOS
            binary: NekoBenchmark.zip
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - name: Set up Godot
        uses: firebelley/setup-godot@v1
        with:
          godot-version: 4.4.1
          include-export-templates: true
      - name: Run state-machine tests
        run: godot --headless --path . --script tests/reaction_state_test.gd
      - name: Export project
        run: godot --headless --path . --export-release "${{ matrix.preset }}"
      - name: Package export
        shell: bash
        run: |
          mkdir -p package
          cp "dist/${{ matrix.binary }}" package/
          cp assets/MapleMono-OFL.txt package/
          (cd package && zip -r "../dist/${{ matrix.asset }}" .)
      - uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.asset }}
          path: dist/${{ matrix.asset }}
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          pattern: nekobenchmark-*
          path: release-assets
          merge-multiple: true
      - name: Publish release
        env:
          GH_REPO: ${{ github.repository }}
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.tag || github.ref_name }}
        run: |
          gh release create --repo "$GH_REPO" "$RELEASE_TAG" release-assets/* \
            --target "$GITHUB_SHA" \
            --title "$RELEASE_TAG" \
            --notes "Automated cross-platform binaries for commit ${GITHUB_SHA}."
